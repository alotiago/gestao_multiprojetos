# Docker Compose — Produção
# Gestor Multiprojetos
#
# USO:
#   docker compose -f docker-compose.prod.yml up -d
#
# REQUISITOS:
#   - Criar arquivo .env.production com todas as variáveis
#   - Certificados TLS em ./infrastructure/certs/

services:
  # ===== Banco de Dados PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: gestor_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gestor_internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ===== Cache Redis =====
  redis:
    image: redis:7-alpine
    container_name: gestor_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - gestor_internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ===== Backend (NestJS) =====
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: gestor_backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gestor_internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ===== Frontend (Next.js) =====
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: gestor_frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    networks:
      - gestor_internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: gestor_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - gestor_internal
      - gestor_external
    deploy:
      resources:
        limits:
          memory: 128M

  # ===== Prometheus (Monitoramento) =====
  prometheus:
    image: prom/prometheus:latest
    container_name: gestor_prometheus
    restart: always
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gestor_internal
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  # ===== Grafana (Dashboards) =====
  grafana:
    image: grafana/grafana:latest
    container_name: gestor_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3002}
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - gestor_internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  gestor_internal:
    driver: bridge
    internal: true
  gestor_external:
    driver: bridge
