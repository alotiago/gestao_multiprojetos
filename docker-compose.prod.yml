# Docker Compose — Produção na OCI
# Gestor Multiprojetos
# Use: docker-compose -f docker-compose.prod.yml up -d

version: '3.9'

services:
  # ===== Banco de Dados PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: gestor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-gestor_multiprojetos}
      POSTGRES_USER: ${DATABASE_USER:-gestor}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-100}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/prisma/migrations:/docker-entrypoint-initdb.d
    networks:
      - gestor_internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-gestor}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== Cache Redis =====
  redis:
    image: redis:7-alpine
    container_name: gestor_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - gestor_internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ===== Backend (NestJS) =====
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        NODE_ENV: production
    image: ${OCIR_REGISTRY}/gestor-backend:${IMAGE_TAG:-latest}
    container_name: gestor_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "9090:9090"
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Database
      DATABASE_URL: postgresql://${DATABASE_USER:-gestor}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-gestor_multiprojetos}?schema=public
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-'24h'}
      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-https://example.com.br}
      BACKEND_URL: ${BACKEND_URL:-https://api.example.com.br}
      BACKEND_PORT: 3001
      # Upload
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      # Observabilidade
      PROMETHEUS_ENABLED: 'true'
      PROMETHEUS_PORT: 9090
      # Segurança
      CORSORIGINS: ${CORS_ORIGINS:-'https://example.com.br'}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gestor_internal
      - gestor_external
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /run

  # ===== Frontend (Next.js) =====
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.example.com.br}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://example.com.br}
    image: ${OCIR_REGISTRY}/gestor-frontend:${IMAGE_TAG:-latest}
    container_name: gestor_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.example.com.br}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://example.com.br}
    depends_on:
      - backend
    networks:
      - gestor_internal
      - gestor_external
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /.next

  # ===== Prometheus =====
  prometheus:
    image: prom/prometheus:latest
    container_name: gestor_prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - gestor_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp

  # ===== Grafana =====
  grafana:
    image: grafana/grafana:latest
    container_name: gestor_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.example.com.br}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3100:3000"
    networks:
      - gestor_internal
      - gestor_external
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUMES_PATH}/postgres_data
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUMES_PATH}/redis_data
  backend_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUMES_PATH}/backend_uploads
  backend_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUMES_PATH}/backend_logs
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUMES_PATH}/prometheus_data
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUMES_PATH}/grafana_data

networks:
  gestor_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.25.0.0/16
  gestor_external:
    driver: bridge
