services:
  # ===== Banco de Dados PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: gestor_postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-gestor_multiprojetos}
      POSTGRES_USER: ${DATABASE_USER:-admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-ChangeMe123!}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gestor_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-admin} -d ${DATABASE_NAME:-gestor_multiprojetos}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Cache Redis =====
  redis:
    image: redis:7-alpine
    container_name: gestor_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ChangeMe123!}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - gestor_network
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Backend (NestJS) =====
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: gestor_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-gestor_multiprojetos}
      DATABASE_USER: ${DATABASE_USER:-admin}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-ChangeMe123!}
      DATABASE_URL: postgresql://${DATABASE_USER:-admin}:${DATABASE_PASSWORD:-ChangeMe123!}@postgres:5432/${DATABASE_NAME:-gestor_multiprojetos}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ChangeMe123!}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gestor_network

  # ===== Frontend (Next.js) =====
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: gestor_frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - gestor_network

  # ===== Prometheus (Monitoramento) =====
  prometheus:
    image: prom/prometheus:latest
    container_name: gestor_prometheus
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - gestor_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # ===== Grafana (Visualização) =====
  grafana:
    image: grafana/grafana:latest
    container_name: gestor_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - '3002:3000'
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - gestor_network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  gestor_network:
    driver: bridge
