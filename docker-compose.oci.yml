# ===========================================================
# Gestor de Multiprojetos - OCI VM (producao)
# Nginx interno: 127.0.0.1:8081:80
# SSL/TLS: gerenciado pelo nginx HOST (setup_host_nginx.sh)
# Deploy: deploy/oci/full_deploy_vm.sh
# ===========================================================

services:
  # ===== Banco de Dados PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    container_name: gmp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-gestor_multiprojetos}
      POSTGRES_USER: ${DATABASE_USER:-gestor}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - gmp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-gestor} -d ${DATABASE_NAME:-gestor_multiprojetos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gmp_internal

  # ===== Cache Redis =====
  redis:
    image: redis:7-alpine
    container_name: gmp-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - gmp_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gmp_internal

  # ===== Backend NestJS =====
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: gmp-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DATABASE_USER:-gestor}:${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}@postgres:5432/${DATABASE_NAME:-gestor_multiprojetos}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      FRONTEND_URL: ${FRONTEND_URL:-https://gestaodeprojetos.oais.cloud}
      BACKEND_URL: ${BACKEND_URL:-https://gestaodeprojetos.oais.cloud/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://gestaodeprojetos.oais.cloud}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
    volumes:
      - gmp_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://127.0.0.1:3001/health',(res)=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gmp_internal

  # ===== Frontend Next.js =====
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://gestaodeprojetos.oais.cloud/api}
        NODE_ENV: production
    container_name: gmp-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gmp_internal

  # ===== Nginx (proxy interno; SSL no HOST) =====
  nginx:
    image: nginx:1.27-alpine
    container_name: gmp-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./deploy/oci/nginx-gmp.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gmp_internal

volumes:
  gmp_postgres_data:
  gmp_redis_data:
  gmp_uploads:

networks:
  gmp_internal:
    driver: bridge
