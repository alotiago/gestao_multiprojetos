# Gestor de Multiprojetos — Nginx interno (HTTP)
# SSL/TLS terminado pelo nginx do HOST
# /api/* -> NestJS backend:3001 (remove prefixo /api)
# /*     -> Next.js  frontend:3000

server {
    listen 80;
    server_name _;

    # Upload de arquivos
    client_max_body_size 50M;

    # API (NestJS) — remove prefixo /api antes do proxy
    location /api/ {
        proxy_pass         http://gmp-backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check direto do backend (acessível pelo gateway)
    location = /health {
        proxy_pass         http://gmp-backend:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # Frontend (Next.js) — tudo mais
    location / {
        proxy_pass         http://gmp-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
